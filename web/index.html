<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bijoy to LaTeX Converter</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --surface-raised: #fafbfc;
      --border: #e0e3e8;
      --border-light: #eef0f3;
      --text: #111827;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --accent-light: #eef2ff;
      --accent-subtle: #f5f3ff;
      --success: #059669;
      --success-light: #ecfdf5;
      --danger: #dc2626;
      --danger-light: #fef2f2;
      --warning-light: #fffbeb;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.06), 0 2px 4px -2px rgba(0,0,0,0.04);
      --transition: 150ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0;
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(8px);
      background: rgba(255,255,255,0.92);
    }

    .header-inner {
      max-width: 920px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand { display: flex; align-items: center; gap: 10px; }

    .brand-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .brand-icon svg { width: 18px; height: 18px; }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--text);
    }

    .header-file {
      font-size: 0.8rem;
      color: var(--text-muted);
      display: none;
      align-items: center;
      gap: 6px;
    }

    .header-file.visible { display: flex; }

    .header-file svg { width: 14px; height: 14px; }

    .container {
      max-width: 920px;
      margin: 0 auto;
      padding: 0 24px;
    }

    main { padding: 28px 0 80px; }

    /* Drop Zone */
    .dropzone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 56px 24px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
      background: var(--surface);
      position: relative;
    }

    .dropzone:hover {
      border-color: var(--accent);
      background: var(--accent-subtle);
    }

    .dropzone.drag-over {
      border-color: var(--accent);
      background: var(--accent-light);
      transform: scale(1.005);
    }

    .dropzone.has-file {
      padding: 28px 24px;
      border-style: solid;
      border-color: var(--border-light);
    }

    .dropzone-icon {
      width: 52px;
      height: 52px;
      margin: 0 auto 18px;
      color: var(--text-muted);
      transition: color var(--transition);
    }

    .dropzone:hover .dropzone-icon { color: var(--accent); }

    .dropzone h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .dropzone .subtitle {
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .dropzone .file-hint {
      display: inline-block;
      margin-top: 14px;
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--bg);
      padding: 4px 12px;
      border-radius: 20px;
    }

    .dropzone input { display: none; }

    /* Status bar */
    .status {
      margin-top: 20px;
      display: none;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: var(--text-secondary);
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      background: var(--surface);
      border: 1px solid var(--border-light);
    }

    .status.visible { display: flex; }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status.error {
      color: var(--danger);
      background: var(--danger-light);
      border-color: transparent;
    }

    .status.done {
      color: var(--success);
      background: var(--success-light);
      border-color: transparent;
    }

    /* Stats row */
    .stats-row {
      display: none;
      gap: 8px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .stats-row.visible { display: flex; }

    .stat-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-secondary);
      box-shadow: var(--shadow-sm);
    }

    .stat-chip strong {
      font-weight: 700;
      color: var(--accent);
    }

    /* Toolbar */
    .toolbar {
      display: none;
      justify-content: space-between;
      align-items: center;
      margin-top: 24px;
    }

    .toolbar.visible { display: flex; }

    .toolbar-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: none;
      border-radius: var(--radius-sm);
      padding: 7px 14px;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      font-family: inherit;
      white-space: nowrap;
    }

    .btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-accent {
      background: var(--accent);
      color: white;
    }

    .btn-accent:hover { background: var(--accent-hover); }

    .btn.copied {
      background: var(--success-light) !important;
      border-color: var(--success) !important;
      color: var(--success) !important;
    }

    .copy-icon-small {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      flex-shrink: 0;
      padding: 0;
    }

    .copy-icon-small:hover {
      background: var(--accent-light);
      color: var(--accent);
    }

    .copy-icon-small.copied {
      color: var(--success);
      background: var(--success-light);
    }

    .copy-icon-small svg { width: 14px; height: 14px; }

    /* Results */
    .results {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .question-card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--transition);
    }

    .question-card:hover { box-shadow: var(--shadow-md); }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-light);
    }

    .card-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-number {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: var(--accent-light);
      padding: 3px 10px;
      border-radius: 20px;
    }

    .card-header-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card-body { padding: 16px; }

    /* Question row with inline copy */
    .question-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .question-text {
      font-size: 0.95rem;
      line-height: 1.75;
      flex: 1;
      min-width: 0;
      overflow-x: auto;
    }

    .question-text::-webkit-scrollbar,
    .option-content::-webkit-scrollbar {
      height: 4px;
    }

    .question-text::-webkit-scrollbar-thumb,
    .option-content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    /* Options */
    .options-grid {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 360px), 1fr));
      gap: 6px;
      margin-top: 14px;
    }

    .option-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      transition: all var(--transition);
    }

    .option-item:hover {
      border-color: var(--border);
      background: var(--surface-raised);
    }

    .option-marker {
      font-size: 0.78rem;
      font-weight: 700;
      color: white;
      background: var(--accent);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .option-content {
      flex: 1;
      min-width: 0;
      font-size: 0.9rem;
      line-height: 1.6;
      overflow-x: auto;
    }

    .katex-display { margin: 0.4em 0 !important; }
    .katex { font-size: 1.05em !important; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* Animations */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .question-card {
      animation: fadeSlideIn 0.25s ease-out both;
    }

    /* Tooltip */
    .tooltip-wrap { position: relative; }
    .tooltip-wrap::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%) scale(0.95);
      background: var(--text);
      color: white;
      font-size: 0.7rem;
      padding: 4px 8px;
      border-radius: 4px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s, transform 0.15s;
    }
    .tooltip-wrap:hover::after {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    @media (max-width: 640px) {
      .container { padding: 0 16px; }
      .dropzone { padding: 40px 16px; }
      .options-grid { grid-template-columns: 1fr; }
      .header-file { display: none !important; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </div>
        <h1>Bijoy to LaTeX</h1>
      </div>
      <div class="header-file" id="headerFile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span id="fileName"></span>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="dropzone" id="dropzone">
        <svg class="dropzone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <h2>Upload your .docx file</h2>
        <p class="subtitle">Drag and drop or click to browse</p>
        <span class="file-hint">Bijoy-encoded Word documents supported</span>
        <input type="file" id="fileInput" accept=".docx" />
      </div>

      <div class="status" id="status">
        <div class="spinner" id="spinner"></div>
        <span id="statusText">Processing...</span>
      </div>

      <div class="stats-row" id="stats"></div>

      <div class="toolbar" id="toolbar">
        <span class="toolbar-label" id="toolbarLabel"></span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost tooltip-wrap" data-tooltip="Copy all as plain text" id="copyAllTextBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy All Text
          </button>
          <button class="btn btn-accent tooltip-wrap" data-tooltip="Copy all as JSON array" id="copyAllJsonBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy All JSON
          </button>
        </div>
      </div>

      <div class="results" id="results"></div>
    </div>
  </main>

  <script>
    const MARKERS = ["\u0995", "\u0996", "\u0997", "\u0998", "\u0999", "\u099A", "\u099B", "\u099C"];
    const COPY_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
    const CHECK_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

    const $ = (id) => document.getElementById(id);
    const dropzone = $("dropzone");
    const fileInput = $("fileInput");
    const statusEl = $("status");
    const spinner = $("spinner");
    const statusText = $("statusText");
    const statsEl = $("stats");
    const toolbar = $("toolbar");
    const toolbarLabel = $("toolbarLabel");
    const copyAllTextBtn = $("copyAllTextBtn");
    const copyAllJsonBtn = $("copyAllJsonBtn");
    const resultsEl = $("results");
    const headerFile = $("headerFile");
    const fileNameEl = $("fileName");

    let lastResult = null;

    dropzone.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", () => {
      if (fileInput.files.length) handleFile(fileInput.files[0]);
    });

    dropzone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropzone.classList.add("drag-over");
    });
    dropzone.addEventListener("dragleave", () => dropzone.classList.remove("drag-over"));
    dropzone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropzone.classList.remove("drag-over");
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });

    copyAllJsonBtn.addEventListener("click", () => {
      if (!lastResult) return;
      copyToClipboard(JSON.stringify(lastResult.questions, null, 2), copyAllJsonBtn);
    });

    copyAllTextBtn.addEventListener("click", () => {
      if (!lastResult) return;
      const allText = lastResult.questions.map((q, i) => {
        let s = `${i + 1}. ${q.question}`;
        if (q.options.length) {
          s += "\n" + q.options.map((o, oi) => `   ${MARKERS[oi] || String.fromCharCode(0x0995 + oi)}) ${o}`).join("\n");
        }
        return s;
      }).join("\n\n");
      copyToClipboard(allText, copyAllTextBtn);
    });

    async function handleFile(file) {
      if (!file.name.endsWith(".docx")) {
        showError("Please upload a .docx file");
        return;
      }

      fileNameEl.textContent = file.name;
      headerFile.classList.add("visible");
      dropzone.classList.add("has-file");

      showStatus("Converting " + file.name + "...");
      resultsEl.innerHTML = "";
      statsEl.innerHTML = "";
      statsEl.classList.remove("visible");
      toolbar.classList.remove("visible");

      const form = new FormData();
      form.append("file", file);

      try {
        const res = await fetch("/api/convert", { method: "POST", body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Conversion failed");
        lastResult = data;
        showDone(`${data.questions.length} questions extracted successfully`);
        renderStats(data.stats);
        renderResults(data.questions);
      } catch (err) {
        showError(err.message);
      }
    }

    function showStatus(msg) {
      statusEl.className = "status visible";
      spinner.style.display = "block";
      statusText.textContent = msg;
    }

    function showDone(msg) {
      statusEl.className = "status visible done";
      spinner.style.display = "none";
      statusText.textContent = msg;
    }

    function showError(msg) {
      statusEl.className = "status visible error";
      spinner.style.display = "none";
      statusText.textContent = msg;
    }

    function renderStats(stats) {
      const items = [
        ["Questions", stats.totalQuestions],
        ["Equations", stats.totalEquations],
        ["Bijoy Runs", stats.bijoyRunsConverted],
        ["Tables", stats.tablesProcessed],
      ];
      statsEl.innerHTML = items
        .filter(([, v]) => v > 0)
        .map(([label, val]) => `<div class="stat-chip">${label} <strong>${val}</strong></div>`)
        .join("");
      statsEl.classList.add("visible");
    }

    function renderResults(questions) {
      toolbarLabel.textContent = `${questions.length} questions`;
      toolbar.classList.add("visible");
      resultsEl.innerHTML = "";

      questions.forEach((q, i) => {
        const card = document.createElement("div");
        card.className = "question-card";
        card.style.animationDelay = `${Math.min(i * 30, 300)}ms`;

        // Header
        const header = document.createElement("div");
        header.className = "card-header";

        const headerLeft = document.createElement("div");
        headerLeft.className = "card-header-left";

        const num = document.createElement("span");
        num.className = "card-number";
        num.textContent = `Q${i + 1}`;
        headerLeft.appendChild(num);

        const headerActions = document.createElement("div");
        headerActions.className = "card-header-actions";

        const copyQBtn = makeCopyBtn("Copy question", () => q.question);
        headerActions.appendChild(copyQBtn);

        if (q.options.length > 0) {
          const copyFullBtn = makeCopyBtn("Copy all", () => buildCopyText(q));
          headerActions.appendChild(copyFullBtn);
        }

        header.appendChild(headerLeft);
        header.appendChild(headerActions);

        // Body
        const body = document.createElement("div");
        body.className = "card-body";

        const qRow = document.createElement("div");
        qRow.className = "question-row";

        const qText = document.createElement("div");
        qText.className = "question-text";
        renderMath(qText, q.question);
        qRow.appendChild(qText);

        body.appendChild(qRow);

        // Options
        if (q.options.length > 0) {
          const list = document.createElement("ul");
          list.className = "options-grid";

          q.options.forEach((opt, oi) => {
            const li = document.createElement("li");
            li.className = "option-item";

            const marker = document.createElement("span");
            marker.className = "option-marker";
            marker.textContent = MARKERS[oi] || String.fromCharCode(0x0995 + oi);

            const content = document.createElement("span");
            content.className = "option-content";
            renderMath(content, opt);

            const optCopy = makeSmallCopyBtn(() => opt);

            li.appendChild(marker);
            li.appendChild(content);
            li.appendChild(optCopy);
            list.appendChild(li);
          });

          body.appendChild(list);
        }

        card.appendChild(header);
        card.appendChild(body);
        resultsEl.appendChild(card);
      });
    }

    function makeCopyBtn(label, getTextFn) {
      const btn = document.createElement("button");
      btn.className = "btn btn-ghost";
      btn.innerHTML = COPY_SVG + ` ${label}`;
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        copyToClipboard(getTextFn(), btn);
      });
      return btn;
    }

    function makeSmallCopyBtn(getTextFn) {
      const btn = document.createElement("button");
      btn.className = "copy-icon-small";
      btn.innerHTML = COPY_SVG;
      btn.title = "Copy";
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        copyToClipboard(getTextFn(), btn, true);
      });
      return btn;
    }

    function copyToClipboard(text, btn, small) {
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.innerHTML;
        btn.classList.add("copied");
        btn.innerHTML = small
          ? CHECK_SVG
          : CHECK_SVG + " Copied";
        setTimeout(() => {
          btn.innerHTML = orig;
          btn.classList.remove("copied");
        }, 1200);
      });
    }

    function hasLatex(str) {
      return /\\[a-zA-Z]/.test(str);
    }

    function renderMath(el, value) {
      if (!value) { el.textContent = ""; return; }
      if (!hasLatex(value)) { el.textContent = value; return; }

      let processed = value;
      if (!value.includes("\\text{")) {
        processed = value.replace(
          /([\s,]*[\u0980-\u09FF\u0964][\u0980-\u09FF\u0964\s,\[\]\(\)0-9=?।:]*)/g,
          "\\text{$1}"
        );
      }

      try {
        katex.render(processed, el, { throwOnError: false, displayMode: false });
      } catch {
        el.textContent = value;
      }
    }

    function buildCopyText(q) {
      let text = q.question;
      if (q.options.length > 0) {
        text += "\n" + q.options.map((opt, i) => {
          const m = MARKERS[i] || String.fromCharCode(0x0995 + i);
          return `${m}) ${opt}`;
        }).join("\n");
      }
      return text;
    }
  </script>
</body>
